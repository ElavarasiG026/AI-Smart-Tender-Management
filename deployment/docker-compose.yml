version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: tender_db
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: ${DB_NAME:-tender_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: tender_backend
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-password}
      DB_NAME: ${DB_NAME:-tender_db}
      JWT_SECRET: ${JWT_SECRET:-your_secret_key}
      AI_SERVICE_URL: http://ai-service:5000
      CLIENT_URL: http://localhost:3000
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/uploads:/app/uploads
    networks:
      - tender_network

  # Frontend React App
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: tender_frontend
    environment:
      REACT_APP_API_URL: http://localhost:3000/api
    ports:
      - "3001:80"
    depends_on:
      - backend
    networks:
      - tender_network

  # AI Service
  ai-service:
    build:
      context: ../ai-service
      dockerfile: Dockerfile
    container_name: tender_ai_service
    environment:
      FLASK_ENV: production
      FLASK_PORT: 5000
    ports:
      - "5000:5000"
    networks:
      - tender_network

  # Redis (Optional - for caching)
  redis:
    image: redis:7-alpine
    container_name: tender_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - tender_network

volumes:
  postgres_data:
  redis_data:

networks:
  tender_network:
    driver: bridge
